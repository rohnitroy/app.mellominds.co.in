<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MelloMinds Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="%PUBLIC_URL%/MelloFevicon 1.png" />
    <script>
      (function() {
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
          || window.innerWidth < 768;
        var isBookingPage = window.location.pathname.startsWith('/book/');
        if (isMobile && !isBookingPage) {
          window.location.replace('https://mellominds.co.in');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
